<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formularios</title>

<style>

/* ===== CONTENEDOR DE FORMULARIOS ===== */
.formularios-flex {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}


/* ===== FORMULARIOS ===== */
form {
    background: #0d0d0d;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px #00ff88;
    max-width: 350px;
    width: 100%;
}

/* Inputs */
form input,
form textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #00ff88;
    border-radius: 5px;
    background: #000;
    color: #00ff88;
}

/* Focus */
form input:focus,
form textarea:focus {
    outline: none;
    box-shadow: 0 0 8px #00ff88;
}

/* Botón */
form button {
    width: 100%;
    padding: 10px;
    background: #00ff88;
    border: none;
    border-radius: 5px;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

form button:hover {
    background: #00cc66;
}

/* Títulos */
h4 {
    text-align: center;
    color: #00ff88;
}

/* ===== CONTACTO MÁS PEQUEÑO ===== */
#contacto {
    margin-top: 50px;
    display: flex;
    justify-content: center;
}

#contacto form {
    max-width: 300px;
}
</style>

</head>
<body>

<hr>

<h2>Formularios</h2>

<div class="formularios-flex">

    <!-- ===================== -->
    <!-- REGISTRO -->
    <!-- ===================== -->
    <div>
        <h4>Registro</h4>
        <form id="registroForm">

            <input type="text" id="usuario" placeholder="Usuario">

            <input type="email" id="emailRegistro" placeholder="Correo">

            <input type="password" id="password" placeholder="Contraseña">

            <input type="password" id="confirmPassword" placeholder="Confirmar Contraseña">

            <button type="submit">Registrarse</button>

            <p id="mensajeRegistro"></p>

        </form>
    </div>


    <!-- ===================== -->
    <!-- LOGIN -->
    <!-- ===================== -->
    <div>
        <h4>Login</h4>
        <form id="loginForm">

            <input type="email" id="emailLogin" placeholder="Correo">

            <input type="password" id="passwordLogin" placeholder="Contraseña">

            <button type="submit">Ingresar</button>

            <p id="mensajeLogin"></p>

        </form>
    </div>

</div>

<!-- ===================== -->
<!-- CONTACTO -->
<!-- ===================== -->
<section id="contacto">

    <div>
        <h4>Formulario de Contacto</h4>

        <form id="contactoForm">

            <input type="text" id="nombre" placeholder="Nombre">

            <input type="text" id="asunto" placeholder="Asunto">

            <textarea id="mensaje" placeholder="Mensaje" maxlength="200"></textarea>

            <p id="contador">0 / 200</p>

            <button type="submit">Enviar</button>

            <p id="mensajeContacto"></p>

        </form>

    </div>

</section>

<script src="js/validaciones.js"></script>
<script src="js/registro.js"></script>
<script src="js/login.js"></script>
<script src="js/contacto.js"></script>

</body>
</html>
