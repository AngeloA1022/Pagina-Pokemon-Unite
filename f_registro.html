<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formularios</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

.formularios-flex {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

form {
    background: #0d0d0d;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px #00ff88;
    max-width: 350px;
    width: 100%;
}

form input,
form textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #00ff88;
    border-radius: 5px;
    background: #000;
    color: #00ff88;
}

form input:focus,
form textarea:focus {
    outline: none;
    box-shadow: 0 0 8px #00ff88;
}

form button {
    width: 100%;
    padding: 10px;
    background: #00ff88;
    border: none;
    border-radius: 5px;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

form button:hover {
    background: #00cc66;
}

h2 {
    text-align: center;
    color: #00ff88;
}

/* VALIDACIONES VISUALES */
.error {
    border: 1px solid red !important;
}

.ok {
    border: 1px solid #00ff88 !important;
}

/* CONTACTO */
#contacto {
    margin-top: 50px;
    display: flex;
    justify-content: center;
}
</style>

</head>
<body>

<div class="formularios-flex">

    <!-- REGISTRO -->
    <div>
        <h2>Registro</h2>
        <form id="registroForm">
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="email" id="email" placeholder="Correo">
            <input type="password" id="password" placeholder="Contraseña">
            <input type="password" id="confirmar" placeholder="Confirmar Contraseña">
            <button type="submit">Registrarse</button>
            <p id="mensajeRegistro"></p>
        </form>
    </div>

    <!-- LOGIN -->
    <div>
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Correo">
            <input type="password" id="loginPassword" placeholder="Contraseña">
            <button type="submit">Ingresar</button>
            <p id="mensajeLogin"></p>
        </form>
    </div>

</div>

<!-- CONTACTO -->
<section id="contacto">
    <form id="contactoForm">
        <h2>Contacto</h2>

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="asunto" placeholder="Asunto">
        <textarea id="mensaje" rows="4" placeholder="Mensaje"></textarea>

        <small>Caracteres: <span id="contador">0</span></small>

        <button type="submit">Enviar</button>
        <p id="mensajeContacto"></p>
    </form>
</section>

<script src="app.js"></script>
</body>
</html>
